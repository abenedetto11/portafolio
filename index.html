<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fondo: #0a0a0f;
    --panel: #111118;
    --borde: #1e1e2e;
    --texto: #e8e8f0;
    --tenue: #6b6b80;
    --acento: #c8f564;
    --rojo: #ff4d6d;
    --verde: #c8f564;
    --azul: #6496ff;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--fondo);
    color: var(--texto);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 70% 20%, rgba(200,245,100,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(100,150,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .contenedor {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .titulo-grupo h1 {
    font-family: var(--display);
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--acento);
  }

  .titulo-grupo p {
    color: var(--tenue);
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .acciones-header {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-actualizar {
    background: none;
    border: 1px solid var(--borde);
    color: var(--tenue);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .btn-actualizar:hover { border-color: var(--acento); color: var(--acento); }
  .btn-actualizar:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-agregar {
    background: var(--acento);
    color: #0a0a0f;
    border: none;
    padding: 12px 24px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, box-shadow 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-agregar:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200,245,100,0.25);
  }

  .resumen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1px;
    background: var(--borde);
    margin-bottom: 32px;
    border: 1px solid var(--borde);
  }

  .tarjeta-resumen {
    background: var(--panel);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .tarjeta-resumen::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--acento);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .tarjeta-resumen:hover::after { transform: scaleX(1); }

  .tarjeta-resumen .etiqueta {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--tenue);
    margin-bottom: 10px;
  }

  .tarjeta-resumen .valor {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .tarjeta-resumen .valor.positivo { color: var(--verde); }
  .tarjeta-resumen .valor.negativo { color: var(--rojo); }
  .tarjeta-resumen .valor.neutro   { color: var(--texto); }

  .tarjeta-resumen .sub {
    font-size: 11px;
    color: var(--tenue);
    margin-top: 4px;
  }

  .seccion-inferior {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
    align-items: start;
  }

  @media (max-width: 860px) {
    .seccion-inferior { grid-template-columns: 1fr; }
  }

  .tabla-wrapper {
    background: var(--panel);
    border: 1px solid var(--borde);
    overflow: hidden;
  }

  .tabla-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--borde);
    flex-wrap: wrap;
    gap: 12px;
  }

  .tabla-header h2 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.5px;
  }

  .buscar {
    background: var(--fondo);
    border: 1px solid var(--borde);
    color: var(--texto);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 14px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }

  .buscar:focus { border-color: var(--acento); }
  .buscar::placeholder { color: var(--tenue); }

  .tabla-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--tenue);
    padding: 12px 16px;
    text-align: right;
    border-bottom: 1px solid var(--borde);
    white-space: nowrap;
  }

  thead th:first-child, thead th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid rgba(30,30,46,0.5);
    transition: background 0.15s;
    animation: entrar 0.3s ease both;
  }

  @keyframes entrar {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  tbody tr:hover { background: rgba(200,245,100,0.02); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 14px 16px;
    font-size: 13px;
    text-align: right;
    white-space: nowrap;
  }

  td:first-child, td:nth-child(2) { text-align: left; }

  .ticker-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--acento);
    letter-spacing: 0.05em;
  }

  .nombre-ticker { font-size: 11px; color: var(--tenue); margin-top: 2px; }

  .tipo-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid;
    margin-top: 4px;
  }

  .tipo-badge.cedear { border-color: var(--azul); color: var(--azul); }
  .tipo-badge.accion { border-color: var(--acento); color: var(--acento); }

  .positivo { color: var(--verde); }
  .negativo { color: var(--rojo); }
  .flecha { font-size: 10px; margin-right: 2px; }

  .btn-accion {
    background: none;
    border: 1px solid var(--borde);
    color: var(--tenue);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 4px;
  }

  .btn-accion:hover { border-color: var(--rojo); color: var(--rojo); }
  .btn-editar:hover { border-color: var(--azul) !important; color: var(--azul) !important; }

  .precio-cargando { color: var(--tenue); font-size: 11px; }

  .vacio {
    text-align: center;
    padding: 60px 24px;
    color: var(--tenue);
    font-size: 13px;
  }

  .nota-cotizacion {
    font-size: 10px;
    color: var(--tenue);
    padding: 12px 16px;
    border-top: 1px solid var(--borde);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--acento);
    flex-shrink: 0;
    animation: pulso 2s infinite;
  }

  @keyframes pulso {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .grafico-wrapper {
    background: var(--panel);
    border: 1px solid var(--borde);
    padding: 24px;
  }

  .grafico-titulo {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  }

  .grafico-canvas-wrap {
    width: 100%;
    max-width: 220px;
    margin: 0 auto 20px;
  }

  #canvasTorta { display: block; width: 100%; height: auto; }

  .grafico-leyenda {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 260px;
    overflow-y: auto;
  }

  .leyenda-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .leyenda-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .leyenda-ticker {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    flex: 1;
  }

  .leyenda-pct { color: var(--tenue); font-size: 11px; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .overlay.activo { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--borde);
    width: 100%;
    max-width: 480px;
    animation: modal-in 0.25s ease;
  }

  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--borde);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h3 { font-family: var(--display); font-weight: 700; font-size: 18px; }

  .btn-cerrar {
    background: none;
    border: none;
    color: var(--tenue);
    font-size: 20px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .btn-cerrar:hover { color: var(--texto); }

  .modal-body { padding: 24px; }

  .campo { margin-bottom: 18px; }

  .campo label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--tenue);
    margin-bottom: 8px;
  }

  .campo input, .campo select {
    width: 100%;
    background: var(--fondo);
    border: 1px solid var(--borde);
    color: var(--texto);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  .campo input:focus, .campo select:focus { border-color: var(--acento); }
  .campo-fila { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer {
    padding: 16px 24px 24px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancelar {
    background: none;
    border: 1px solid var(--borde);
    color: var(--tenue);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancelar:hover { border-color: var(--texto); color: var(--texto); }

  .btn-guardar {
    background: var(--acento);
    border: none;
    color: #0a0a0f;
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    padding: 10px 24px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .btn-guardar:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,245,100,0.3); }

  .overlay-confirm {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .confirm-box {
    background: var(--panel);
    border: 1px solid var(--borde);
    padding: 32px;
    max-width: 320px;
    width: 100%;
    text-align: center;
    animation: modal-in 0.2s ease;
  }

  .confirm-box p {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .confirm-btns { display: flex; gap: 10px; justify-content: center; }

  .btn-confirm-no {
    background: none;
    border: 1px solid var(--borde);
    color: var(--tenue);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-confirm-no:hover { border-color: var(--texto); color: var(--texto); }

  .btn-confirm-si {
    background: var(--rojo);
    border: none;
    color: #fff;
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    padding: 10px 24px;
    cursor: pointer;
  }

  @media (max-width: 640px) {
    .campo-fila { grid-template-columns: 1fr; }
    td, th { padding: 10px; }
    .btn-accion { padding: 3px 7px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="contenedor">

  <header>
    <div class="titulo-grupo">
      <h1>PORTAFOLIO</h1>
      <p>Tracker de CEDEARs &amp; Acciones</p>
    </div>
    <div class="acciones-header">
      <button class="btn-actualizar" id="btnActualizar" onclick="refrescarManual()">&#8635; Actualizar precios</button>
      <button class="btn-agregar" onclick="abrirModal()">+ Agregar posición</button>
    </div>
  </header>

  <div class="resumen-grid">
    <div class="tarjeta-resumen">
      <div class="etiqueta">Inversión total</div>
      <div class="valor neutro" id="inversionTotal">$0</div>
      <div class="sub" id="cantPosiciones">0 posiciones</div>
    </div>
    <div class="tarjeta-resumen">
      <div class="etiqueta">Valor actual</div>
      <div class="valor neutro" id="valorActual">$0</div>
      <div class="sub" id="ultimaActualizacion">—</div>
    </div>
    <div class="tarjeta-resumen">
      <div class="etiqueta">Ganancia / Pérdida</div>
      <div class="valor neutro" id="gananciaDolares">—</div>
      <div class="sub" id="gananciaSub">—</div>
    </div>
    <div class="tarjeta-resumen">
      <div class="etiqueta">Rendimiento total</div>
      <div class="valor neutro" id="rendimientoTotal">0.00%</div>
      <div class="sub" id="mejorPosicion">—</div>
    </div>
  </div>

  <div class="seccion-inferior">

    <div class="tabla-wrapper">
      <div class="tabla-header">
        <h2>Posiciones</h2>
        <input class="buscar" type="text" placeholder="Buscar ticker..." id="campoBusqueda" oninput="renderTabla()">
      </div>
      <div class="tabla-scroll">
        <div id="contenidoTabla"></div>
      </div>
      <div class="nota-cotizacion">
        <div class="dot"></div>
        Precios via Yahoo Finance (USD). CEDEARs: usá el ticker exacto de Yahoo (ej: MELID, GGALD).
      </div>
    </div>

    <div class="grafico-wrapper">
      <div class="grafico-titulo">Composición</div>
      <div class="grafico-canvas-wrap">
        <canvas id="canvasTorta" width="220" height="220"></canvas>
      </div>
      <div class="grafico-leyenda" id="graficaLeyenda"></div>
    </div>

  </div>
</div>

<div class="overlay" id="overlay" onclick="cerrarModalSiOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="tituloModal">Nueva posición</h3>
      <button class="btn-cerrar" onclick="cerrarModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="campo">
        <label>Ticker (ej: AAPL, MELID, GGALD)</label>
        <input type="text" id="inputTicker" placeholder="AAPL" style="text-transform:uppercase">
      </div>
      <div class="campo">
        <label>Nombre / Descripción</label>
        <input type="text" id="inputNombre" placeholder="Apple Inc.">
      </div>
      <div class="campo">
        <label>Tipo</label>
        <select id="inputTipo">
          <option value="cedear">CEDEAR</option>
          <option value="accion">Acción local</option>
        </select>
      </div>
      <div class="campo-fila">
        <div class="campo">
          <label>Cantidad</label>
          <input type="number" id="inputCantidad" placeholder="10" min="0" step="any">
        </div>
        <div class="campo">
          <label>Precio de compra (USD)</label>
          <input type="number" id="inputPrecioCompra" placeholder="150.00" min="0" step="any">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" onclick="guardarPosicion()">Guardar</button>
    </div>
  </div>
</div>

<div class="overlay-confirm" id="overlayConfirm">
  <div class="confirm-box">
    <p id="confirmTexto"></p>
    <div class="confirm-btns">
      <button class="btn-confirm-no" id="btnConfirmNo">Cancelar</button>
      <button class="btn-confirm-si" id="btnConfirmSi">Borrar</button>
    </div>
  </div>
</div>

<script>
var COLORES = [
  '#c8f564','#6496ff','#ff4d6d','#f5a623','#a78bfa',
  '#34d399','#fb923c','#38bdf8','#f472b6','#facc15',
  '#e879f9','#2dd4bf','#f87171','#818cf8','#fbbf24',
  '#4ade80','#60a5fa','#fb7185','#a3e635','#c084fc',
  '#67e8f9','#fdba74','#86efac','#fca5a5','#93c5fd',
  '#d8b4fe','#6ee7b7','#fcd34d','#7dd3fc','#f9a8d4'
];

var posiciones = JSON.parse(localStorage.getItem('portafolio_v2') || '[]');
var precios = {};
var indiceEditando = null;

function guardarEnStorage() {
  localStorage.setItem('portafolio_v2', JSON.stringify(posiciones));
}

function tickerYahoo(pos) {
  var t = pos.ticker.toUpperCase();
  if (pos.tipo === 'cedear' && !t.endsWith('.BA')) return t + '.BA';
  return t;
}

async function actualizarPrecios() {
  var vistos = {};
  var tickers = [];
  posiciones.forEach(function(p) {
    var t = tickerYahoo(p);
    if (!vistos[t]) { vistos[t] = true; tickers.push(t); }
  });
  if (tickers.length === 0) return;

  tickers.forEach(function(t) { delete precios[t]; });

  try {
    var res = await fetch('/api/precios?tickers=' + tickers.join(','));
    var data = await res.json();
    Object.assign(precios, data);
  } catch(e) {
    tickers.forEach(function(t) { precios[t] = null; });
  }

  renderTabla();
  actualizarResumen();
  renderGrafico();
  document.getElementById('ultimaActualizacion').textContent =
    'Act. ' + new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

async function refrescarManual() {
  var btn = document.getElementById('btnActualizar');
  btn.disabled = true;
  btn.textContent = 'Cargando...';
  await actualizarPrecios();
  btn.disabled = false;
  btn.innerHTML = '&#8635; Actualizar precios';
}

function formatUSD(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatPct(n) {
  if (n === null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function renderTabla() {
  var busqueda = document.getElementById('campoBusqueda').value.toLowerCase();
  var filtradas = posiciones.filter(function(p) {
    return p.ticker.toLowerCase().includes(busqueda) ||
      (p.nombre && p.nombre.toLowerCase().includes(busqueda));
  });

  var contenedor = document.getElementById('contenidoTabla');

  if (posiciones.length === 0) {
    contenedor.innerHTML = '<div class="vacio">Todavía no tenés posiciones. Agregá tu primera inversión.</div>';
    return;
  }
  if (filtradas.length === 0) {
    contenedor.innerHTML = '<div class="vacio">No se encontraron resultados.</div>';
    return;
  }

  var html = '<table><thead><tr>' +
    '<th>Ticker</th><th>Nombre</th><th>Cant.</th>' +
    '<th>P. Compra</th><th>P. Actual</th><th>Invertido</th>' +
    '<th>Valor</th><th>G/P</th><th>Rend.</th><th></th>' +
    '</tr></thead><tbody>';

  filtradas.forEach(function(pos) {
    var idxReal = posiciones.indexOf(pos);
    var pActual = precios[tickerYahoo(pos)];
    var invertido = pos.cantidad * pos.precioCompra;
    var valor = (pActual != null) ? pos.cantidad * pActual : null;
    var ganancia = (valor !== null) ? valor - invertido : null;
    var rend = (ganancia !== null) ? (ganancia / invertido) * 100 : null;
    var clase = rend === null ? '' : rend >= 0 ? 'positivo' : 'negativo';
    var flecha = rend === null ? '' : rend >= 0
      ? '<span class="flecha">&#9650;</span>'
      : '<span class="flecha">&#9660;</span>';

    html += '<tr>' +
      '<td><div class="ticker-label">' + pos.ticker.toUpperCase() + '</div>' +
        '<div class="tipo-badge ' + pos.tipo + '">' + pos.tipo + '</div></td>' +
      '<td><div class="nombre-ticker">' + (pos.nombre || '—') + '</div></td>' +
      '<td>' + pos.cantidad + '</td>' +
      '<td>' + formatUSD(pos.precioCompra) + '</td>' +
      '<td>' + (pActual != null ? formatUSD(pActual) : '<span class="precio-cargando">...</span>') + '</td>' +
      '<td>' + formatUSD(invertido) + '</td>' +
      '<td>' + (valor !== null ? formatUSD(valor) : '—') + '</td>' +
      '<td class="' + clase + '">' + (ganancia !== null ? formatUSD(ganancia) : '—') + '</td>' +
      '<td class="' + clase + '">' + flecha + (rend !== null ? formatPct(rend) : '—') + '</td>' +
      '<td>' +
        '<button class="btn-accion btn-editar" onclick="editarPosicion(' + idxReal + ')">Editar</button>' +
        '<button class="btn-accion" onclick="eliminarPosicion(' + idxReal + ')">Borrar</button>' +
      '</td></tr>';
  });

  html += '</tbody></table>';
  contenedor.innerHTML = html;
}

function actualizarResumen() {
  var totalInvertido = 0;
  var totalValor = 0;
  var conPrecio = 0;
  var mejorTicker = null;
  var mejorRend = -Infinity;

  posiciones.forEach(function(pos) {
    var invertido = pos.cantidad * pos.precioCompra;
    totalInvertido += invertido;
    var pActual = precios[tickerYahoo(pos)];
    if (pActual) {
      conPrecio++;
      var valor = pos.cantidad * pActual;
      totalValor += valor;
      var rend = ((valor - invertido) / invertido) * 100;
      if (rend > mejorRend) { mejorRend = rend; mejorTicker = pos.ticker; }
    } else {
      totalValor += invertido;
    }
  });

  var ganancia = (posiciones.length > 0 && conPrecio > 0) ? totalValor - totalInvertido : null;
  var rendTotal = (conPrecio > 0 && totalInvertido > 0) ? (ganancia / totalInvertido) * 100 : null;

  document.getElementById('inversionTotal').textContent = formatUSD(totalInvertido);
  document.getElementById('cantPosiciones').textContent =
    posiciones.length + ' posici' + (posiciones.length === 1 ? 'ón' : 'ones');

  var elValor = document.getElementById('valorActual');
  elValor.textContent = posiciones.length > 0 ? formatUSD(totalValor) : '$0';
  elValor.className = 'valor neutro';

  var elGan = document.getElementById('gananciaDolares');
  if (ganancia !== null) {
    elGan.textContent = formatUSD(ganancia);
    elGan.className = 'valor ' + (ganancia >= 0 ? 'positivo' : 'negativo');
  } else {
    elGan.textContent = '—';
    elGan.className = 'valor neutro';
  }

  document.getElementById('gananciaSub').textContent =
    ganancia !== null ? (ganancia >= 0 ? 'Ganancia acumulada' : 'Pérdida acumulada') : 'Sin precios aún';

  var elRend = document.getElementById('rendimientoTotal');
  if (rendTotal !== null) {
    elRend.textContent = formatPct(rendTotal);
    elRend.className = 'valor ' + (rendTotal >= 0 ? 'positivo' : 'negativo');
  } else {
    elRend.textContent = '0.00%';
    elRend.className = 'valor neutro';
  }

  document.getElementById('mejorPosicion').textContent =
    mejorTicker ? 'Mejor: ' + mejorTicker + ' (' + formatPct(mejorRend) + ')' : '—';
}

function renderGrafico() {
  var canvas = document.getElementById('canvasTorta');
  var ctx = canvas.getContext('2d');
  var leyendaEl = document.getElementById('graficaLeyenda');
  var W = 220, H = 220;
  ctx.clearRect(0, 0, W, H);

  if (posiciones.length === 0) {
    ctx.beginPath();
    ctx.arc(W/2, H/2, W/2 - 10, 0, Math.PI * 2);
    ctx.fillStyle = '#1e1e2e';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(W/2, H/2, (W/2 - 10) * 0.52, 0, Math.PI * 2);
    ctx.fillStyle = '#111118';
    ctx.fill();
    leyendaEl.innerHTML = '<div class="leyenda-item" style="color:var(--tenue);font-size:11px;justify-content:center;">Sin posiciones</div>';
    return;
  }

  var datos = posiciones.map(function(pos) {
    var pActual = precios[tickerYahoo(pos)];
    var valor = pActual ? pos.cantidad * pActual : pos.cantidad * pos.precioCompra;
    return { ticker: pos.ticker.toUpperCase(), valor: valor };
  });

  var total = datos.reduce(function(s, d) { return s + d.valor; }, 0);
  var cx = W/2, cy = H/2, r = W/2 - 8, ri = r * 0.52;
  var angulo = -Math.PI / 2;

  datos.forEach(function(d, i) {
    var slice = (d.valor / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angulo, angulo + slice);
    ctx.closePath();
    ctx.fillStyle = COLORES[i % COLORES.length];
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, r + 1, angulo, angulo + slice);
    ctx.strokeStyle = '#0a0a0f';
    ctx.lineWidth = 3;
    ctx.stroke();
    angulo += slice;
  });

  ctx.beginPath();
  ctx.arc(cx, cy, ri, 0, Math.PI * 2);
  ctx.fillStyle = '#111118';
  ctx.fill();

  var html = '';
  datos.forEach(function(d, i) {
    var pct = ((d.valor / total) * 100).toFixed(1);
    html += '<div class="leyenda-item">' +
      '<div class="leyenda-dot" style="background:' + COLORES[i % COLORES.length] + '"></div>' +
      '<span class="leyenda-ticker">' + d.ticker + '</span>' +
      '<span class="leyenda-pct">' + pct + '%</span>' +
    '</div>';
  });
  leyendaEl.innerHTML = html;
}

function abrirModal(idx) {
  indiceEditando = (idx !== undefined) ? idx : null;
  document.getElementById('tituloModal').textContent =
    indiceEditando !== null ? 'Editar posición' : 'Nueva posición';

  if (indiceEditando !== null) {
    var pos = posiciones[indiceEditando];
    document.getElementById('inputTicker').value = pos.ticker;
    document.getElementById('inputNombre').value = pos.nombre || '';
    document.getElementById('inputTipo').value = pos.tipo;
    document.getElementById('inputCantidad').value = pos.cantidad;
    document.getElementById('inputPrecioCompra').value = pos.precioCompra;
  } else {
    document.getElementById('inputTicker').value = '';
    document.getElementById('inputNombre').value = '';
    document.getElementById('inputTipo').value = 'cedear';
    document.getElementById('inputCantidad').value = '';
    document.getElementById('inputPrecioCompra').value = '';
  }

  document.getElementById('overlay').classList.add('activo');
  setTimeout(function() { document.getElementById('inputTicker').focus(); }, 100);
}

function cerrarModal() {
  document.getElementById('overlay').classList.remove('activo');
  indiceEditando = null;
}

function cerrarModalSiOverlay(e) {
  if (e.target === document.getElementById('overlay')) cerrarModal();
}

function guardarPosicion() {
  var ticker = document.getElementById('inputTicker').value.trim().toUpperCase();
  var nombre = document.getElementById('inputNombre').value.trim();
  var tipo = document.getElementById('inputTipo').value;
  var cantidad = parseFloat(document.getElementById('inputCantidad').value);
  var precioCompra = parseFloat(document.getElementById('inputPrecioCompra').value);

  if (!ticker || isNaN(cantidad) || isNaN(precioCompra) || cantidad <= 0 || precioCompra <= 0) {
    alert('Completá todos los campos correctamente.');
    return;
  }

  var posicion = { ticker: ticker, nombre: nombre, tipo: tipo, cantidad: cantidad, precioCompra: precioCompra };

  if (indiceEditando !== null) {
    posiciones[indiceEditando] = posicion;
  } else {
    posiciones.push(posicion);
  }

  delete precios[tickerYahoo(posicion)];
  guardarEnStorage();
  cerrarModal();
  renderTabla();
  actualizarResumen();
  renderGrafico();
  actualizarPrecios();
}

function editarPosicion(idx) { abrirModal(idx); }

function eliminarPosicion(idx) {
  var pos = posiciones[idx];
  document.getElementById('confirmTexto').textContent = 'Borrar ' + pos.ticker.toUpperCase() + '?';
  document.getElementById('overlayConfirm').style.display = 'flex';

  document.getElementById('btnConfirmSi').onclick = function() {
    posiciones.splice(idx, 1);
    guardarEnStorage();
    document.getElementById('overlayConfirm').style.display = 'none';
    renderTabla();
    actualizarResumen();
    renderGrafico();
  };

  document.getElementById('btnConfirmNo').onclick = function() {
    document.getElementById('overlayConfirm').style.display = 'none';
  };
}

document.getElementById('inputTicker').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});

renderTabla();
actualizarResumen();
renderGrafico();
actualizarPrecios();
setInterval(actualizarPrecios, 60000);
</script>
</body>
</html>
